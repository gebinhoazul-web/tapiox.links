<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tapioxx</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #080808;
      --surface: #111111;
      --border: #1e1e1e;
      --accent: #7c3aed;
      --accent-glow: rgba(124, 58, 237, 0.35);
      --accent-soft: rgba(124, 58, 237, 0.12);
      --text: #f0f0f0;
      --muted: #555;
      --twitch: #9147ff;
      --youtube: #ff0000;
      --livepix: #00d9a6;
      --instagram: #e1306c;
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 60px 20px 80px;
      overflow-x: hidden;
    }

    /* subtle noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      position: relative;
      z-index: 1;
    }

    /* ── AVATAR ── */
    .avatar-wrap {
      position: relative;
      width: 96px;
      height: 96px;
      margin-bottom: 28px;
    }

    .avatar-ring {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 2px solid transparent;
      background: conic-gradient(var(--accent), transparent 60%, var(--accent)) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      animation: spin 4s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .avatar-glow {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.08); }
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 1;
    }

    /* live badge */
    .live-dot {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 14px;
      height: 14px;
      background: #ef4444;
      border-radius: 50%;
      border: 2.5px solid var(--bg);
      z-index: 2;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── NAME / BIO ── */
    .name {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      text-align: center;
      line-height: 1;
      margin-bottom: 6px;
    }

    .handle {
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .bio {
      font-size: 0.85rem;
      font-weight: 300;
      color: #888;
      text-align: center;
      line-height: 1.6;
      max-width: 300px;
      margin-bottom: 44px;
    }

    .bio strong {
      color: #bbb;
      font-weight: 500;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 32px;
      height: 1px;
      background: var(--accent);
      margin-bottom: 44px;
      opacity: 0.6;
    }

    /* ── LINKS ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      position: relative;
      overflow: hidden;
      transition: border-color 0.25s ease, transform 0.2s ease;
    }

    .link-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      border-radius: 0 2px 2px 0;
      background: var(--platform-color, var(--accent));
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .link-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--platform-color, var(--accent));
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .link-card:hover {
      border-color: var(--platform-color, var(--accent));
      transform: translateX(4px);
    }

    .link-card:hover::before { opacity: 1; }
    .link-card:hover::after { opacity: 0.04; }

    .link-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--accent-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .link-icon svg {
      width: 18px;
      height: 18px;
    }

    .link-text {
      flex: 1;
      position: relative;
      z-index: 1;
    }

    .link-label {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 2px;
    }

    .link-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }

    .link-arrow {
      position: relative;
      z-index: 1;
      color: var(--muted);
      transition: transform 0.2s ease, color 0.2s ease;
      flex-shrink: 0;
    }

    .link-card:hover .link-arrow {
      transform: translateX(4px);
      color: var(--text);
    }

    /* platform colors */
    .link-card[data-p="twitch"]    { --platform-color: var(--twitch); }
    .link-card[data-p="youtube"]   { --platform-color: var(--youtube); }
    .link-card[data-p="livepix"]   { --platform-color: var(--livepix); }
    .link-card[data-p="instagram"] { --platform-color: var(--instagram); }

    .link-card[data-p="twitch"]    .link-icon { background: rgba(145, 71, 255, 0.1); }
    .link-card[data-p="youtube"]   .link-icon { background: rgba(255, 0, 0, 0.08); }
    .link-card[data-p="livepix"]   .link-icon { background: rgba(0, 217, 166, 0.08); }
    .link-card[data-p="instagram"] .link-icon { background: rgba(225, 48, 108, 0.08); }

    /* ── FOOTER ── */
    .footer {
      margin-top: 60px;
      font-size: 0.7rem;
      color: #2a2a2a;
      letter-spacing: 0.04em;
      text-align: center;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      width: 100%;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #333;
      margin-bottom: 10px;
      padding-left: 4px;
    }

    /* ── WATERMARK ── */
    .watermark {
      position: fixed;
      bottom: 18px;
      right: 20px;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: lowercase;
      color: #222;
      pointer-events: none;
      user-select: none;
      z-index: 99;
    }

    /* entrance animation */
    .container > * {
      animation: fadeUp 0.5s ease both;
    }
    .avatar-wrap { animation-delay: 0.05s; }
    .name        { animation-delay: 0.1s; }
    .handle      { animation-delay: 0.13s; }
    .bio         { animation-delay: 0.16s; }
    .divider     { animation-delay: 0.2s; }
    .links       { animation-delay: 0.25s; }
    .footer      { animation-delay: 0.3s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
